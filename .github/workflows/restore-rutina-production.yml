name: Restore Rutina Production

on:
  push:
    branches:
      - recovery/rutina

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Rutina
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Rutina
        run: pnpm exec nuxi build --preset=cloudflare_pages
        env:
          NUXT_OAUTH_GITHUB_CLIENT_ID: ${{ secrets.NUXT_OAUTH_GITHUB_CLIENT_ID }}
          NUXT_OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.NUXT_OAUTH_GITHUB_CLIENT_SECRET }}
          NUXT_OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.NUXT_OAUTH_GOOGLE_CLIENT_ID }}
          NUXT_OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.NUXT_OAUTH_GOOGLE_CLIENT_SECRET }}
          NUXT_SESSION_PASSWORD: ${{ secrets.NUXT_SESSION_PASSWORD }}

      - name: Find Cloudflare production branch
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          curl -fsS \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/habit-id" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            > /tmp/cloudflare-project.json

          test "$(jq -r '.success' /tmp/cloudflare-project.json)" = "true"

          PRODUCTION_BRANCH="$(jq -r '.result.production_branch' /tmp/cloudflare-project.json)"

          test -n "${PRODUCTION_BRANCH}"
          test "${PRODUCTION_BRANCH}" != "null"

          echo "Cloudflare production branch: ${PRODUCTION_BRANCH}"
          echo "branch=${PRODUCTION_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Deploy Rutina to production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm exec wrangler pages deploy dist \
            --project-name=habit-id \
            --branch="${{ steps.cloudflare.outputs.branch }}"
